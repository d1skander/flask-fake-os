<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Терминал</title>
</head>
<body>
    <form action="{{ url_for('desktop_pages.terminal_desktop') }}" method="post">
        {{ form.hidden_tag() }}
        {{ form.message.label }}
        <button type="submit">Отправить</button>
    </form>
    {% if message %}
        <p {{ message }} ></p>
    {% endif %}
</body>
</html>
