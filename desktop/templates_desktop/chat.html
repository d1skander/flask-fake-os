<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href={{ url_for('static', filename='css/chat.css') }}>
    <title>Мессенджер</title>
</head>
<body>
    <div id="chats">
        <p>Сообщения</p>
        {% for i in messages %}
        <ul>
            <div id="chat">
                <p id="username">{{ i.username }}</p>
                <p id="message">{{ i.message }}</p>
                <p id="date">{{ i.date }}</p>
            </div>
        </ul>
        {% endfor %}
    </div>
    <form action="{{ url_for('desktop_pages.chat_desktop') }}" method="post">
        {{ form.hidden_tag() }}
        {{ form.message.label }} {{ form.message(size=50) }}
        <button type="submit">Отправить</button>
    </form>
</body>
</html>
